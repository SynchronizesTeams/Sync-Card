<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adly Fahreza / ID Card (Static Clone)</title>
  <meta name="description" content="Official ID Card of Adly Fahreza / SynchronizeTeams. Web Dev, AI & ML, Linux.">
  
  <!-- Modern Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <style type="text/css">
    :root {
      --color-ink: #111111;
      --color-canvas: #ffffff;
      --color-accent-blue: #3a86c8;
      --font-inter: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-outfit: 'Outfit', sans-serif;
    }

    body {
      font-family: var(--font-inter);
      background-color: #f3f4f6; /* Soft page background to make card pop */
      color: var(--color-ink);
    }

    .border-ink {
      border-color: var(--color-ink) !important;
    }

    /* Grid/blueprint background */
    .bg-grid {
      background-size: 20px 20px;
      background-image: 
        linear-gradient(to right, rgba(17, 17, 17, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(17, 17, 17, 0.05) 1px, transparent 1px);
      background-color: #ffffff;
    }

    /* Neubrutalism card custom styles */
    .neo-card {
      border: 3px solid var(--color-ink);
      box-shadow: 10px 10px 0px 0px var(--color-ink);
      aspect-ratio: 4 / 5;
    }

    .neo-img-container {
      border: 3px solid var(--color-ink);
      box-shadow: 4px 4px 0px 0px var(--color-ink);
    }

    .neo-tag {
      border: 2px solid var(--color-ink);
      border-radius: 100px;
    }

    .neo-bar {
      border: 3px solid var(--color-ink);
      box-shadow: 4px 4px 0px 0px var(--color-ink);
    }

    /* Entry Animation */
    .card-container {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .card-container.animate {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Page print layout optimization */
    @media print {
      body {
        background: white !important;
      }
      header, footer, .print-hide {
        display: none !important;
      }
      .neo-card {
        box-shadow: none !important;
        transform: none !important;
        margin: 0 auto !important;
      }
    }
  </style>
</head>
<body class="bg-[#f3f4f6] text-ink antialiased min-h-screen flex flex-col justify-center items-center py-8 px-4 md:px-8 selection:bg-rose-500 selection:text-white">

  <!-- Main Container -->
  <main class="w-full max-w-[480px] flex justify-center items-center relative overflow-hidden">
    
    <!-- Card Container for Animating Entry -->
    <div id="card-container" class="card-container w-full p-4 flex items-center justify-center relative z-25">
      
      <!-- The Card itself -->
      <div id="id-card" class="w-full bg-grid neo-card rounded-[16px] p-6 sm:p-8 flex flex-col justify-between relative select-none">
      
        <!-- Header Logo inside Card -->
        <div class="w-full flex justify-center mb-4">
          <img src="assets/SynchronizeTeams Logo Dark(1)(1).png" alt="SynchronizeTeams Logo" class="h-8 sm:h-9 object-contain select-none pointer-events-none">
        </div>

        <!-- Card Main Content Split Grid -->
        <div class="grid grid-cols-[1fr_1fr] gap-5 items-stretch">
          
          <!-- Left Column -->
          <div class="flex flex-col justify-between">
            <!-- Name & Subtitle -->
            <div class="flex flex-col">
              <h2 class="font-poppins font-black text-[28px] sm:text-[23px] text-ink leading-[1.1] tracking-tight uppercase">
                Adly Fahreza
              </h2>
              <span class="font-inter font-medium text-[#3a86c8] text-sm sm:text-base mt-1.5 uppercase tracking-wide">
                Vibe Coders
              </span>
            </div>

            <!-- QR Code container -->
            <div class="border-3 border-black rounded-[12px] p-2 bg-white mt-5 aspect-square max-w-[145px] flex items-center justify-center relative">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://adeli.tech&color=111111" alt="QR Code" class="w-full h-full object-contain">
            </div>

            <!-- Tags Section -->
            <div class="flex flex-col gap-2 mt-5">
              <!-- Row 1 Tags -->
              <div class="flex gap-2">
                <span class="neo-tag bg-[#a2c2fc] font-outfit font-semibold text-[8px] sm:text-xs text-ink px-3.5 py-1 uppercase tracking-wider select-none">
                  WebDev
                </span>
                <span class="neo-tag bg-[#fca2a2] font-outfit font-semibold text-[8px] sm:text-xs text-ink px-3.5 py-1 uppercase tracking-wider select-none">
                  AI & ML
                </span>
              </div>
              <!-- Row 2 Tags -->
              <div class="flex gap-2">
                <span class="neo-tag bg-[#a2fca2] font-outfit font-semibold text-[8px] sm:text-xs text-ink px-3.5 py-1 uppercase tracking-wider select-none">
                  SysAdmin
                </span>
                <span class="neo-tag bg-[#fca2fca2] font-outfit font-semibold text-[8px] sm:text-xs text-ink px-3.5 py-1 uppercase tracking-wider select-none">
                  Devops
                </span>
              </div>
            </div>

          </div>

          <!-- Right Column (Picture Frame) -->
          <div class="h-full flex flex-col justify-end">
            <div class="neo-img-container border-3 border-black rounded-[12px] bg-[#a2c2fc] relative overflow-hidden flex items-end justify-center h-full min-h-[280px]">
              <!-- Anime Avatar Image (Transparency overlayed on blue background) -->
              <img src="assets/face.png" alt="Adly's Portrait" class="w-[25rem] h-full object-contain object-bottom translate-y-[2%] scale-[1.26] z-10 select-none pointer-events-none">
            </div>
          </div>

        </div>

        <!-- Bottom Social Footer Bar inside Card -->
        <div class="neo-bar rounded-[12px] bg-white p-3.5 mt-4 flex items-center justify-around">
          <!-- Instagram Handle -->
          <a href="https://instagram.com/justshikoo" target="_blank" class="flex items-center gap-2 text-ink py-0.5">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
              <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" />
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
            </svg>
            <span class="font-outfit font-semibold text-xs sm:text-sm tracking-tight lowercase">@adeleeeeyyyy</span>
          </a>

          <!-- Website Link -->
          <a href="https://adeli.tech" target="_blank" class="flex items-center gap-2 text-ink py-0.5">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
              <path d="M2 12h20" />
            </svg>
            <span class="font-outfit font-semibold text-xs sm:text-sm tracking-tight lowercase">adeli.tech</span>
          </a>
        </div>

      </div>
    </div>

  </main>

  <!-- Image Loader & Entry Animation Script -->
  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', () => {
      const cardContainer = document.getElementById('card-container');

      // --- Image Loader Logic ---
      const images = Array.from(document.querySelectorAll('img'));
      let loadedCount = 0;

      // Fallback timeout to ensure card animates even on slow networks
      const fallbackTimeout = setTimeout(() => {
        if (cardContainer && !cardContainer.classList.contains('animate')) {
          cardContainer.classList.add('animate');
        }
      }, 2000);

      function checkAllImagesLoaded() {
        loadedCount++;
        if (loadedCount === images.length && cardContainer) {
          clearTimeout(fallbackTimeout);
          cardContainer.classList.add('animate');
        }
      }

      if (images.length === 0) {
        if (cardContainer) cardContainer.classList.add('animate');
        clearTimeout(fallbackTimeout);
      } else {
        images.forEach(img => {
          if (img.complete) {
            checkAllImagesLoaded();
          } else {
            img.addEventListener('load', checkAllImagesLoaded);
            img.addEventListener('error', checkAllImagesLoaded); // Proceed on error
          }
        });
      }
    });
  </script>
</body>
</html>
